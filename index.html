<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>폐허 서울: 캠프 생존</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <section class="story-shell">
      <header class="status-strip">
        <div class="status-grid">
          <button id="hp-status" class="status-trigger" data-stat="hp" type="button" aria-label="체력 상세 보기">
            <span class="status-icon" aria-hidden="true">❤️</span>
            <span class="visually-hidden">체력</span>
            <span class="meter compact">
              <span id="hp-fill"></span>
            </span>
          </button>
          <button id="mind-status" class="status-trigger" data-stat="mind" type="button" aria-label="정신력 상세 보기">
            <span class="status-icon" aria-hidden="true">🧠</span>
            <span class="visually-hidden">정신력</span>
            <span class="meter compact">
              <span id="mind-fill"></span>
            </span>
          </button>
          <button id="fullness-status" class="status-trigger" data-stat="fullness" type="button" aria-label="포만감 상세 보기">
            <span class="status-icon" aria-hidden="true">🍖</span>
            <span class="visually-hidden">포만감</span>
            <span class="meter compact">
              <span id="fullness-fill"></span>
            </span>
          </button>
          <section class="status-chip status-time">
            <strong id="time-indicator">1일차 06:00</strong>
          </section>
        </div>
        <div id="status-popover" class="status-popover" hidden></div>
      </header>

      <main class="story-stage">
        <section class="scene-frame">
          <div class="scene-art-wrap">
            <img id="scene-art" src="assets/scenes/camp.svg" alt="현재 장면 일러스트">
            <div class="scene-overlay">
              <span id="scene-location-badge" class="pill">생존자 캠프</span>
              <span id="scene-risk-badge" class="pill muted">안전</span>
            </div>
          </div>
          <div class="scene-copy">
            <div id="system-note" class="system-note" hidden></div>
            <div id="scene-debug-badge" class="scene-debug-badge"></div>
            <div id="scene-text" class="scene-text"></div>
            <div id="choices" class="choice-list"></div>
          </div>
        </section>
      </main>
    </section>

    <footer class="utility-dock">
      <nav class="dock-buttons" aria-label="보조 메뉴">
        <button class="dock-button active" data-panel="map" type="button">이동</button>
        <button class="dock-button" data-panel="inventory" type="button">아이템</button>
        <button class="dock-button" data-panel="skills" type="button">스킬</button>
        <button class="dock-button" data-panel="quests" type="button">퀘스트</button>
        <button class="dock-button" data-panel="log" type="button">기록</button>
      </nav>
      <section class="panel-shell">
        <div class="panel-header">
          <p id="panel-title">지도</p>
          <span id="panel-subtitle">이동 가능한 장소와 연결 상태를 확인할 수 있습니다.</span>
        </div>
        <div id="panel-content" class="panel-content"></div>
      </section>
      <div class="utility-actions">
        <button id="new-game-button" class="ghost-button" type="button">새 게임</button>
      </div>
    </footer>

    <section id="llm-debug-panel" class="llm-debug-panel" hidden>
      <div class="llm-debug-header">
        <p>LLM 요청 로그</p>
        <span>개발 환경에서만 보입니다. 최근 요청과 응답을 확인할 수 있습니다.</span>
      </div>
      <div id="llm-debug-list" class="llm-debug-list"></div>
    </section>
  </div>

  <template id="choice-template">
    <button class="choice-button" type="button">
      <span class="choice-label"></span>
      <small class="choice-meta"></small>
    </button>
  </template>

  <script type="module" src="app-api.js"></script>
</body>
</html>
