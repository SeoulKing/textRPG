<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>잔불 아래 | 텍스트 RPG MVP</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="status-strip">
      <div class="brand-block">
        <p class="kicker">TEXT RPG MVP</p>
        <h1>잔불 아래</h1>
      </div>
      <div class="top-meta">
        <div class="time-card">
          <span class="meta-label">현재 시간</span>
          <strong id="time-indicator">1일차 아침</strong>
        </div>
        <button id="new-game-button" class="ghost-button" type="button">새 게임</button>
      </div>
      <div class="status-grid">
        <section class="status-card">
          <div class="status-copy">
            <span>체력</span>
            <strong id="hp-value">8 / 10</strong>
          </div>
          <div class="meter">
            <span id="hp-fill"></span>
          </div>
        </section>
        <section class="status-card">
          <div class="status-copy">
            <span>정신력</span>
            <strong id="mind-value">7 / 10</strong>
          </div>
          <div class="meter">
            <span id="mind-fill"></span>
          </div>
        </section>
        <section class="status-card">
          <div class="status-copy">
            <span>포만감</span>
            <strong id="fullness-value">6 / 10</strong>
          </div>
          <div class="meter">
            <span id="fullness-fill"></span>
          </div>
        </section>
        <section class="status-chip">
          <span>돈</span>
          <strong id="money-value">12원</strong>
        </section>
      </div>
    </header>

    <main class="story-stage">
      <section class="scene-frame">
        <div class="scene-art-wrap">
          <img id="scene-art" src="assets/scenes/camp.svg" alt="현재 장면 일러스트">
          <div class="scene-overlay">
            <span id="scene-location-badge" class="pill">생존자 캠프</span>
            <span id="scene-risk-badge" class="pill muted">안전</span>
          </div>
        </div>
        <div class="scene-copy">
          <div class="eyebrow-row">
            <span class="eyebrow">짧은 서술 + 선택 + 상태 변화</span>
            <span id="quest-hint" class="quest-hint">주 퀘스트: 약품을 찾아야 한다.</span>
          </div>
          <h2 id="scene-title">잔불 아래에서 눈을 뜬다</h2>
          <div id="scene-text" class="scene-text"></div>
          <div id="system-note" class="system-note" hidden></div>
          <div id="choices" class="choice-list"></div>
        </div>
      </section>
    </main>

    <footer class="utility-dock">
      <nav class="dock-buttons" aria-label="보조 메뉴">
        <button class="dock-button active" data-panel="map" type="button">지도</button>
        <button class="dock-button" data-panel="inventory" type="button">아이템</button>
        <button class="dock-button" data-panel="skills" type="button">스킬</button>
        <button class="dock-button" data-panel="quests" type="button">퀘스트</button>
        <button class="dock-button" data-panel="log" type="button">기록</button>
      </nav>
      <section class="panel-shell">
        <div class="panel-header">
          <p id="panel-title">지도</p>
          <span id="panel-subtitle">이동 가능한 장소와 연결 상태를 확인할 수 있습니다.</span>
        </div>
        <div id="panel-content" class="panel-content"></div>
      </section>
    </footer>
  </div>

  <template id="choice-template">
    <button class="choice-button" type="button">
      <span class="choice-label"></span>
      <small class="choice-meta"></small>
    </button>
  </template>

  <script defer src="app.js"></script>
</body>
</html>
